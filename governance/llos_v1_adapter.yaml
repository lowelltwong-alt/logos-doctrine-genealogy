  registry_ref: logos-governance-architecture:governance/registry/LLOS_ROUTE_REGISTRY.yaml
  category_allowlist:
    - doctrine_scaffold
    - profile_scope
    - lineage_validation
    - source_trust
authority:
  authorizes_runtime_adapters: false
  authorizes_source_authority: false
  authorizes_data_authority: false
  authorizes_theology_authority: false
  authorizes_source_imports: false
  authorizes_source_rows: false
  authorizes_data_records: false
  authorizes_doctrine_lineage_records: false
